<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="svgPairsToThreads.js" type="text/javascript"></script>
    <style>
        svg {margin-right: 2em}
        span {margin-right: 0.5em}
        .thread_0 {stroke: chartreuse}
        .thread_1 {stroke: black}
        .thread_2 {stroke: deepskyblue}
        .thread_3 {stroke: orange}
    </style>
    <title>test SVG Pairs to Threads</title>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
<body onload="newLegendStitch(document.getElementById('stitch').value)">
<h1>test SVG Pairs to Threads</h1>
<p>
<input type="text"
       value="cltlcrtcctc"
       id="stitch"
       pattern="[ctlrCTLR]+"
       title="C/c=cross, T/t=twist both, L/l=left twist, R/r=right twist. Other characters are ignored."/>
<button onclick="newLegendStitch(document.getElementById('stitch').value)">Run Test</button>
<br>
<label for="upload">Show legend stitches of file downloaded from GF symmetry page:</label>
<input id="upload" type="file" accept="image/svg+xml" onchange="loadSVGFile()"/>
</p>
</body>
